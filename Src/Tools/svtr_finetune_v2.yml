# Config training recognition SVTR - DATASET V2 (bersih, anti-leakage)
# Perubahan dari v1:
#   - pakai train_v2.txt / val_v2.txt (sudah digabung sintetik + roboflow + riil bersih)
#   - tetap arsitektur SVTR_LCNet (sama dengan sebelumnya, untuk konsistensi paper)
#
# Placeholder diisi oleh cell Kaggle (lihat KAGGLE_TRAINING_GUIDE.md):
#   USE_GPU_PLACEHOLDER, DICT_PATH_PLACEHOLDER, CHECKPOINT_PLACEHOLDER, PROJECT_PATH
Global:
  model_name: PP-OCRv5_mobile_rec
  debug: false
  use_gpu: USE_GPU_PLACEHOLDER
  epoch_num: 200
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: PROJECT_PATH/output/PP-OCRv5_v2/
  save_epoch_step: 10
  eval_batch_step: [0, 300]
  cal_metric_during_train: true
  pretrained_model: null
  checkpoints: CHECKPOINT_PLACEHOLDER
  save_inference_dir: null
  use_visualdl: false
  infer_img: doc/imgs_words/ch/word_1.jpg
  character_dict_path: DICT_PATH_PLACEHOLDER
  max_text_length: &max_text_length 30
  infer_mode: false
  use_space_char: true
  distributed: false
  save_res_path: PROJECT_PATH/output/PP-OCRv5_v2/predicts.txt
  d2s_train_image_shape: [3, 48, 320]

Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc

Train:
  dataset:
    name: MultiScaleDataSet
    ds_width: false
    data_dir: PROJECT_PATH/
    ext_op_transform_idx: 1
    label_file_list:
      - PROJECT_PATH/train_v3.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecConAug:
          prob: 0.5
          ext_data_num: 2
          image_shape: [48, 320, 3]
          max_text_length: *max_text_length
      - RecAug:
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  sampler:
    name: MultiScaleSampler
    scales: [[320, 32], [320, 48], [320, 64]]
    first_bs: &bs 64
    fix_bs: false
    divided_factor: [8, 16]
    is_training: True
  loader:
    shuffle: true
    batch_size_per_card: *bs
    drop_last: true
    num_workers: 4

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: PROJECT_PATH/
    label_file_list:
      - PROJECT_PATH/val_v3.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 320]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 4
